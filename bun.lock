# Collaborate Dash

Collaborate Dash is a modern team collaboration and task management platform that helps teams manage projects, assign tasks, track progress, and improve productivity through an interactive dashboard.



---

## 📌 Features

- User Authentication (Login & Signup)
- Project Management
- Task Creation and Assignment
- Role-Based Access Control
- Team Collaboration
- Task Status Tracking
- Interactive Dashboard
- Responsive User Interface

---

## 🛠️ Tech Stack

### Frontend
- React.js
- TypeScript
- Tailwind CSS

### Backend
- Node.js
- Express.js

### Database
- MongoDB

### Deployment
- Railway

